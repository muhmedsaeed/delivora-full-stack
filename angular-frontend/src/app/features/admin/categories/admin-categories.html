@if (error) { <div class="alert alert-danger">{{ error }}</div> }

<div class="d-flex flex-column flex-md-row justify-content-between align-items-start gap-3 mb-3">
  <div>
    <h3 class="mb-1">Category Management</h3>
    <p class="text-secondary small mb-0">Organize categories with a polished admin interface.</p>
  </div>
  <button class="btn btn-primary" (click)="showForm = !showForm">{{ showForm ? 'Cancel' : 'Add Category' }}</button>
</div>

@if (showForm) {
<div class="card border-secondary bg-dark mb-4 shadow-sm">
  <div class="card-body">
    <form [formGroup]="form" (ngSubmit)="save()">
      <div class="row g-3">
        <div class="col-md-6">
          <label class="form-label">Name</label>
          <input class="form-control" formControlName="name">
        </div>
        <div class="col-md-6">
          <label class="form-label">Description</label>
          <textarea class="form-control" rows="2" formControlName="description"></textarea>
        </div>
        <div class="col-12">
          <button class="btn btn-success" [disabled]="form.invalid">Save</button>
        </div>
      </div>
    </form>
  </div>
</div>
}

<div class="card border-secondary bg-dark shadow-sm">
  <div class="card-body p-0">
    <div class="table-responsive">
      <table class="table table-striped mb-0 align-middle table-dark">
        <thead>
          <tr>
            <th>ID</th>
            <th>Name</th>
            <th>Description</th>
            <!-- <th>Food Count</th> -->
            <!-- <th>Foods</th> -->
            <th class="text-center">Actions</th>
          </tr>
        </thead>
        <tbody>
          @for (cat of categories(); track cat.id) {
          <tr>
            <td>{{ cat.id }}</td>
            <td>{{ cat.name }}</td>
            <td>{{ cat.description }}</td>
            <!-- <td>{{ cat.foodCount }}</td> -->
            <!-- <td>{{ cat.foodList.join(', ') || '—' }}</td> -->
            <td class="text-center">
              <!-- <button class="btn btn-sm btn-outline-warning me-3" (click)="delete(cat.id)">Edit</button> -->
              <button class="btn btn-sm btn-outline-danger" (click)="delete(cat.id)">Delete</button>
            </td>
          </tr>
          } @empty {
          <tr>
            <td colspan="5" class="text-muted text-center">No categories yet.</td>
          </tr>
          }
        </tbody>
      </table>
    </div>
  </div>
</div>
