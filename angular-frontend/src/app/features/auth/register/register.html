<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-7">
            <div class="card p-4 shadow-sm">
                <h3 class="text-center mb-4">Create an Account</h3>
                @if (error) { <div class="alert alert-danger">{{ error }}</div> }
                <form [formGroup]="form" (ngSubmit)="onSubmit()">
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Username</label>
                            <input class="form-control" formControlName="username">
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Full Name</label>
                            <input class="form-control" formControlName="fullName">
                        </div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Email</label>
                        <input type="email" class="form-control" formControlName="email">
                    </div>

                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Password</label>
                            <input type="password" class="form-control" formControlName="password">
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Confirm Password</label>
                            <input type="password" class="form-control" formControlName="passwordConfirmed">
                        </div>
                    </div>

                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Phone Number</label>
                            <input class="form-control" formControlName="phoneNumber">
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Birth Date</label>
                            <input type="date" class="form-control" formControlName="birthDate">
                        </div>
                    </div>

                    <hr class="my-3">
                    <p class="text-muted mb-3">Delivery Address (optional)</p>

                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Street</label>
                            <input class="form-control" formControlName="street">
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label">City</label>
                            <input class="form-control" formControlName="city">
                        </div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Country</label>
                        <input class="form-control" formControlName="country">
                    </div>

                    <button class="btn btn-primary w-100" [disabled]="form.invalid || loading">
                        {{ loading ? 'Creating account...' : 'Sign Up' }}
                    </button>
                </form>
                <p class="text-center mt-3">
                    Already have an account? <a routerLink="/auth/login">Login here</a>
                </p>
            </div>
        </div>
    </div>
</div>
